<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - ROJO</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="login-page">

    <header class="site-header header-solid">
        <a href="index.html" class="brand">ROJO</a>
        <nav class="nav" id="menu">
            <a href="index.html#colecao">COLEÇÃO</a>
            <a href="index.html#sobre">SOBRE</a>
            <a href="index.html#contato">CONTATO</a>
            <a href="login.html" class="nav-login">ENTRAR</a>
        </nav>
    </header>

    <div class="login-container">
        <div class="login-header">
            <h2>Criar Conta</h2>
            <p>Junte-se ao universo ROJO</p>
        </div>

        <form id="registerForm" class="login-form">
            <div class="form-group">
                <label for="nome">Nome Completo</label>
                <input type="text" id="nome" required placeholder="Seu nome">
            </div>

            <div class="form-group">
                <label for="email">E-mail</label>
                <input type="email" id="email" required placeholder="seu@email.com">
            </div>

            <div class="form-group">
                <label for="cpf">CPF</label>
                <input type="text" id="cpf" required placeholder="000.000.000-00" maxlength="14">
            </div>
            
            <div class="form-group">
                <label for="senha">Senha</label>
                <input type="password" id="senha" required placeholder="Mínimo 8 caracteres">
                <small id="passwordStrength" style="font-size: 11px; color: #999;"></small>
            </div>

            <div class="form-group">
                <label for="confirmarSenha">Confirmar Senha</label>
                <input type="password" id="confirmarSenha" required placeholder="Repita a senha">
            </div>

            <div id="messageBox" class="error-msg" style="display: none; font-size: 14px; margin-bottom: 15px; text-align: center;"></div>

            <button type="submit" class="btn-three">Finalizar Cadastro</button>
            <p class="form-footer">Já possui conta? <a href="login.html">Fazer Login</a></p>
        </form>
    </div>
    
    <script src="register.js"></script>
</body>
</html>
