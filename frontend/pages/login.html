<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - ROJO</title>
    <link rel="stylesheet" href="/frontend/styles/style.css"></head>
<body class="login-page">

  <div id="header-placeholder"></div>

    <div class="login-container">
        <div class="login-header">
            <h2>Área Exclusiva</h2>
            <p>Introduza as suas credenciais para aceder</p>
        </div>

<form id="loginForm" class="login-form">
    <div class="form-group">
        <label for="email">E-mail</label>
        <input type="email" id="email" required placeholder="seu@email.com">
    </div>
    
    <div class="form-group">
        <label for="senha">Palavra-passe</label>
        <div style="position: relative;">
            <input type="password" id="password" required placeholder="••••••••">
            <button type="button" id="togglePwd" style="position: absolute; right: 10px; top: 50%; transform: translateY(-50%); border: none; background: none; cursor: pointer;">👁️</button>
        </div>
    </div>

    <div id="feedback" class="error-msg" style="color: #7a1b1b; font-size: 14px; margin-bottom: 15px; text-align: center;"></div>

    <button type="submit" id="submitBtn" class="btn-three">Entrar</button>
    <p class="form-footer">Não tem conta? <a href="register.html">Cadastre-se</a></p>
</form>
    </div>
    
    <script src="../scripts/login.js"></script>
    <div id="footer-placeholder"></div>
    <script src="/frontend/scripts/script.js"></script>
    <script src="/frontend/scripts/main.js"></script>
</body>
</html>
