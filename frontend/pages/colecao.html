<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coleção - ROJO</title>
    <link rel="stylesheet" href="../styles/style.css">
</head>
<body class="login-page">

    <div id="header-placeholder"></div>

    <main class="container catalog-container">
        <div class="login-header">
            <br><br><br><br><br>
            <h2>Nossa Coleção</h2>
            <p>Fragrâncias que definem presença e personalidade</p>
        </div>

        <div id="produtos-container" class="product-grid">
            <p style="color: white; text-align: center; grid-column: span 3;">Carregando fragrâncias...</p>
        </div>
    </main>
    
    <div id="footer-placeholder"></div>

    <div id="toast" style="display:none; position: fixed; bottom: 30px; right: 30px; background: #1a1a1a; color: #D4AF37; padding: 15px 25px; border-left: 4px solid #D4AF37; z-index: 9999; font-family: Montserrat, sans-serif; letter-spacing: 1px; text-transform: uppercase; box-shadow: 0 10px 30px rgba(0,0,0,0.2);">
        Item adicionado ao carrinho!
    </div>

    <script src="../scripts/script.js"></script>
    <script src="../scripts/main.js"></script>
</body>
</html>
